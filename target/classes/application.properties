# 端口号
server.port=8080

#数据库配置（MySQL）
spring.datasource.url=jdbc:mysql://localhost:3306/dhc_pms?useUnicode=true&characterEncoding=gb2312&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.example.dhcpms.*.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.com.example.dhcpms=debug

# Redis 配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=5000ms

# Lettuce 配置
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2
spring.redis.lettuce.pool.max-wait=1000ms
spring.redis.lettuce.shutdown-timeout=100ms

# JWT 配置
jwt.secret=abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890
jwt.expire=86400
jwt.token-prefix=Bearer

# 二维码/加密配置
encrypt.bcrypt.rounds=10
qrcode.size=300

# 定时任务配置
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=schedule-
spring.task.scheduling.shutdown.await-termination=true
spring.task.scheduling.shutdown.await-termination-period=5000ms

# DeepSeek AI 配置
deepseek.api.key=sk-e7a9008dfdb24c97b06c435b854aa338
deepseek.api.url=https://api.deepseek.com/v1/chat/completions
deepseek.api.model=deepseek-chat
deepseek.api.timeout=30000

# 文件上传配置
spring:
servlet:
multipart:
max-file-size: 10MB
max-request-size: 10MB

# 自定义配置
file:
upload:
path: ./uploads/messages/
